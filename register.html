<!DOCTYPE html>
<html>
<head>
    <title>SwapApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FAD4D4',     // pastel red
        primaryDark: '#F5B5B5', // slightly deeper pastel red
        secondary: '#DFF5E1',   // pastel green
        secondaryDark: '#C7EACB',
        accent: '#5E8C61'       // soft green text accent
      }
    }
  }
}
</script>
</head>
<body class="bg-secondary">

    <div id="navbar"></div>

<main class="flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

        <form>
            <div class="mb-4">
                <label class="block mb-2 text-sm font-medium">Full Name</label>
                <input type="text"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter your name">
            </div>

            <div class="mb-4">
                <label class="block mb-2 text-sm font-medium">Email</label>
                <input type="email"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter your email">
            </div>

            <div class="mb-6">
                <label class="block mb-2 text-sm font-medium">Password</label>
                <input type="password"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:ring-2 focus:ring-blue-500"
                       placeholder="Create a password">
            </div>

            <button type="submit"
                    class="w-full bg-accent hover:bg-primaryDark text-white py-2 rounded-lg hover:bg-green-700 transition">
                Register
            </button>
        </form>
    </div>
</main>

    <script src="js/ui.js"></script>
</body>
</html>
