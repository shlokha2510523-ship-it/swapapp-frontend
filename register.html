<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>SwapShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#EDE7F6',
        primaryDark: '#D1C4E9',
        secondary: '#F3E5F5',
        secondaryDark: '#CE93D8',
        accent: '#7B1FA2'
         
      },
       fontFamily: {
        sans: ['Poppins', 'sans-serif']
       }
    }
  }
}
</script>
</head>
<body class="bg-secondary">
    <div id="navbar"></div>

<main class="flex justify-center items-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

        <form id="registerForm">
            <div class="mb-4">
                <label class="block mb-2 text-sm font-medium">Full Name</label>
                <input type="text" id="name"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-accent"
                       placeholder="Enter your name">
            </div>

            <div class="mb-4">
                <label class="block mb-2 text-sm font-medium">Email</label>
                <input type="email" id="email"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-accent"
                       placeholder="Enter your email">
            </div>

            <div class="mb-6">
                <label class="block mb-2 text-sm font-medium">Password</label>
                <input type="password" id="password"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-accent"
                       placeholder="Create a password">
            </div>

            <button type="submit"
                    class="w-full bg-accent text-white py-2 rounded-lg hover:bg-green-700 transition">
                Register
            </button>
        </form>

        <p class="text-sm text-center mt-4">
            Already have an account?
            <a href="login.html" class="text-blue-500 hover:underline">Login</a>
        </p>
    </div>
</main>

    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
