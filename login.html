<!DOCTYPE html>
<html>
<head>
    <title>SwapApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FAD4D4',     // pastel red
        primaryDark: '#F5B5B5', // slightly deeper pastel red
        secondary: '#DFF5E1',   // pastel green
        secondaryDark: '#C7EACB',
        accent: '#5E8C61'       // soft green text accent
      }
    }
  }
}
</script>
</head>
<body class="bg-primary">

    <div id="navbar"></div>

<main class="flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block mb-2 text-sm font-medium">Email</label>
                <input type="email" id="email"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter your email">
            </div>

            <div class="mb-6">
                <label class="block mb-2 text-sm font-medium">Password</label>
                <input type="password" id="password"
                       class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter your password">
            </div>

            <button type="submit"
                    class="w-full bg-accent text-white px-3 py-4 rounded-lg hover:bg-secondaryDark transition">
                Login
            </button>
            
        </form>

        <p class="text-sm text-center mt-4">
            Don't have an account?
            <a href="register.html" class="text-blue-500 hover:underline">Register</a>
        </p>
    </div>
</main>

    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
