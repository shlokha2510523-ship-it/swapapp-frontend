<!DOCTYPE html>
<html>
<head>
    <title>SwapApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#FAD4D4',
        primaryDark: '#F5B5B5',
        secondary: '#DFF5E1',
        secondaryDark: '#C7EACB',
        accent: '#5E8C61'
      }
    }
  }
}
</script>
</head>
<body class="bg-primary">
    <div id="navbar"></div>

<main class="flex justify-center items-start min-h-screen pt-12">
    <div class="w-full max-w-2xl px-4">

        <h2 class="text-2xl font-bold mb-2 text-center">Dashboard</h2>

        <!-- Stats -->
        <div id="dashboardStats"></div>

        <!-- Create Project -->
        <h3 class="text-xl font-bold mt-8 mb-4 text-center">Create Project</h3>
        <div class="bg-white p-6 rounded-lg shadow-md">
            <form id="createProjectForm">
                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">Project Title</label>
                    <input type="text" id="projectTitle"
                           class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-accent"
                           placeholder="Enter project title">
                </div>

                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">Description</label>
                    <textarea id="projectDescription"
                        class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-accent"
                        placeholder="Describe your project"></textarea>
                </div>

                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">Type</label>
                    <select id="projectType" class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-accent">
                        <option>Durable</option>
                        <option>Perishable</option>
                    </select>
                </div>

                <button type="submit"
                        class="w-full bg-accent text-white py-2 rounded-lg hover:bg-green-700 transition">
                    Create
                </button>
            </form>
        </div>

        <!-- Projects List -->
        <h3 class="text-xl font-bold mt-8 mb-4 text-center">All Projects</h3>
        <div id="projectsList"></div>

    </div>
</main>

    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
