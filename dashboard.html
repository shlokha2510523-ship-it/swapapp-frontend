<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>SwapShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#EDE7F6',
        primaryDark: '#D1C4E9',
        secondary: '#F3E5F5',
        secondaryDark: '#CE93D8',
        accent: '#7B1FA2'
      },
       fontFamily: {
        sans: ['Poppins', 'sans-serif']
       }
    }
  }
}
</script>
</head>
<body class="bg-primary">

    <div id="navbar"></div>

<main class="flex justify-center items-start min-h-screen pt-12">
    <div class="w-full max-w-lg">
        
        <h2 class="text-2xl font-bold mb-6 text-center">Create Project</h2>

        <div class="bg-white p-6 rounded-lg shadow-md">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

        <div class="bg-green-100 p-4 rounded shadow text-center">
            <p class="text-sm text-gray-600">Total</p>
            <p id="totalCount" class="text-xl font-bold">0</p>
        </div>

        <div class="bg-green-200 p-4 rounded shadow text-center">
            <p class="text-sm text-gray-600">Open</p>
            <p id="openCount" class="text-xl font-bold">0</p>
        </div>

        <div class="bg-yellow-200 p-4 rounded shadow text-center">
            <p class="text-sm text-gray-600">Reserved</p>
            <p id="reservedCount" class="text-xl font-bold">0</p>
        </div>

        <div class="bg-red-200 p-4 rounded shadow text-center">
            <p class="text-sm text-gray-600">Completed</p>
            <p id="completedCount" class="text-xl font-bold">0</p>
        </div>

    </div>

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">

        <!-- Filter Buttons -->
        <div class="flex flex-wrap gap-2 justify-center md:justify-start">
            <button onclick="setFilter('All')" 
                class="filterBtn bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-full text-sm transition">
                All
            </button>

            <button onclick="setFilter('Open')" 
                class="filterBtn bg-green-200 hover:bg-green-300 px-4 py-2 rounded-full text-sm transition">
                Open
            </button>

            <button onclick="setFilter('Reserved')" 
                class="filterBtn bg-yellow-200 hover:bg-yellow-300 px-4 py-2 rounded-full text-sm transition">
                Reserved
            </button>

            <button onclick="setFilter('Completed')" 
                class="filterBtn bg-red-200 hover:bg-red-300 px-4 py-2 rounded-full text-sm transition">
                Completed
            </button>
        </div>

        <!-- Search -->
        <div class="w-full md:w-64">
            <input 
                type="text" 
                id="searchInput"
                placeholder="Search by title..."
                class="w-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-300 px-4 py-2 rounded-full text-sm"
            >
        </div>

    </div>
            <form id="projectForm">
                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">Project Title</label>
                    <input type="text" id="title"
                           class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">Description</label>
                    <textarea id="description"
                        class="w-full px-3 py-2 border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="mb-4">
                    <label class="block mb-2 text-sm font-medium">Type</label>
                    <select id="type" class="w-full px-3 py-2border border-secondary rounded-lg bg-white focus:ring-2 focus:ring-accent focus:ring-2 focus:ring-blue-500">
                        <option>Durable</option>
                        <option>Perishable</option>
                    </select>
                </div>

                <button type="submit"
                        class="w-full bg-accent hover:bg-secondaryDark text-white py-2 rounded-lg hover:bg-blue-700 transition">
                    Create
                </button>
            </form>
            <div id="projectList" class="mt-8 space-y-4"></div>
        </div>
    </div>
</main>
    <script src="js/ui.js"></script>
    <script src="js/config.js"></script>
    <script src="js/mock.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
